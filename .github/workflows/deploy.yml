name: Deploy Blog

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init (with backend)
        working-directory: terraform
        run: terraform init -reconfigure

      - name: Terraform Apply (force state sync)
        working-directory: terraform
        run: terraform apply -auto-approve -refresh=true

      - name: Debug Terraform State
        working-directory: terraform
        run: |
          echo "=== STATE ==="
          terraform state list || true
          echo "=== OUTPUT ==="
          terraform output || true

      - name: Get Bucket Name (FINAL CLEAN)
        id: tf_output
        working-directory: terraform
        run: |
          BUCKET=$(terraform output -raw bucket_name)

          if [ -z "$BUCKET" ]; then
            echo "❌ bucket_name output is empty"
            exit 1
          fi

          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      - name: Install Hugo
        run: |
          HUGO_VERSION=0.150.0
          wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz
          tar -xzf hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz
          sudo mv hugo /usr/local/bin/

      - name: Build Website
        run: hugo

      - name: Deploy to S3
        run: |
          aws s3 sync public/ s3://${{ steps.tf_output.outputs.bucket }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
          --distribution-id E3A67Y0CHJ9DB \
          --paths "/*"
