name: Deploy Blog with Terraform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # 3️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # 4️⃣ Terraform Init
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # 5️⃣ Terraform Apply
      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve
          echo "=== Terraform Outputs ==="
          terraform output || true

      # 6️⃣ Get Bucket Name (FINAL FIX)
      - name: Get Bucket Name
        id: tf_output
        working-directory: terraform
        shell: bash
        run: |
          RAW_OUTPUT=$(terraform output -raw bucket_name 2>/dev/null)

          # Clean debug noise (anything after ::)
          BUCKET=$(echo "$RAW_OUTPUT" | cut -d':' -f1 | tr -d '\n')

          if [ -z "$BUCKET" ]; then
            echo "❌ Failed to extract bucket name"
            echo "Raw output: $RAW_OUTPUT"
            exit 1
          fi

          echo "✅ Bucket: $BUCKET"
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT

      # 7️⃣ Install Hugo
      - name: Install Hugo
        run: |
          HUGO_VERSION=0.150.0
          wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz
          tar -xzf hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz
          sudo mv hugo /usr/local/bin/

      # 8️⃣ Build Website
      - name: Build Website
        run: hugo

      # 9️⃣ Deploy to S3
      - name: Deploy to S3
        run: |
          echo "🚀 Deploying to: ${{ steps.tf_output.outputs.bucket }}"
          aws s3 sync public/ s3://${{ steps.tf_output.outputs.bucket }} --delete

      # 🔟 Invalidate CloudFront
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
          --distribution-id E3A67Y0CHJ9DB \
          --paths "/*"
